<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary -->
    <title>JobFinder — Vagas inteligentes para o seu perfil</title>
    <meta name="description" content="Conecte seu GitHub e LinkedIn. A IA cruza seus projetos e histórico profissional para encontrar vagas que realmente combinam com você." />
    <meta name="author" content="JobFinder" />
    <meta name="keywords" content="vagas, empregos, tecnologia, github, linkedin, inteligência artificial, recrutamento, desenvolvedor" />

    <!-- Theme -->
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="color-scheme" content="dark" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="JobFinder — Vagas inteligentes para o seu perfil" />
    <meta property="og:description" content="Conecte seu GitHub e LinkedIn. A IA cruza seus projetos e histórico profissional para encontrar vagas que realmente combinam com você." />
    <meta property="og:image" content="/icon.svg" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="JobFinder — Vagas inteligentes para o seu perfil" />
    <meta name="twitter:description" content="Conecte seu GitHub e LinkedIn. A IA encontra vagas que combinam com você." />
    <meta name="twitter:image" content="/icon.svg" />

    <!-- PWA / Mobile -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="JobFinder" />
    <meta name="application-name" content="JobFinder" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- Fonts preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
